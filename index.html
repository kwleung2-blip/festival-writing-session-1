<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Final Term Exam Vocabulary List (listening)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* iOS Specific Fixes */
        * {
            -webkit-tap-highlight-color: transparent; /* 移除 iOS 點擊時的灰色反白 */
        }
        
        /* 針對 iPhone 底部的安全區域 (Safe Area) */
        .safe-pb {
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Flip Card CSS */
        .perspective {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .card-inner {
            transition: transform 0.6s;
        }
        .flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Swipe Card CSS */
        .swipe-card {
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            will-change: transform, opacity;
        }
        .swipe-left-anim {
            transform: translate(-150%, 20px) rotate(-15deg) !important;
            opacity: 0;
        }
        .swipe-right-anim {
            transform: translate(150%, 20px) rotate(15deg) !important;
            opacity: 0;
        }

        /* Prevent text selection during interaction */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        /* RPG Game Animations */
        @keyframes warrior-step {
            0% { transform: translateX(var(--start-x, 0)) scale(1); }
            50% { transform: translateX(calc(var(--start-x, 0) + 15px)) scale(1.1); }
            100% { transform: translateX(calc(var(--start-x, 0) + 25px)) scale(1); }
        }
        .anim-step { animation: warrior-step 0.4s ease-out forwards; }
        
        @keyframes warrior-hurt {
            0%, 100% { filter: brightness(1); }
            25% { transform: translateX(calc(var(--start-x, 0) - 10px)); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
            75% { transform: translateX(calc(var(--start-x, 0) + 10px)); filter: brightness(0.5) sepia(1) hue-rotate(-50deg) saturate(5); }
        }
        .anim-hurt { animation: warrior-hurt 0.3s; }

        @keyframes monster-attack {
            0% { transform: translateX(0) scale(1); }
            50% { transform: translateX(-20px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }
        .anim-attack { animation: monster-attack 0.4s; }
        
        .shield-btn {
            transition: all 0.2s;
        }
        .shield-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen font-sans text-gray-800 overscroll-none">

    <!-- App Container -->
    <div id="app" class="max-w-2xl mx-auto p-4 sm:p-6 h-screen flex flex-col relative safe-pb">
        
        <!-- Header -->
        <header class="text-center mb-6 pt-4 pt-[env(safe-area-inset-top)]">
            <h1 class="text-2xl sm:text-3xl font-bold text-blue-800 mb-2">Final Term Exam Vocabulary</h1>
            <p class="text-sm sm:text-base text-gray-600">Listening Practice</p>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col relative w-full h-full">
            
            <!-- View 1: Main Menu -->
            <div id="view-home" class="view-section flex flex-col items-center justify-center space-y-4 flex-1">
                <button onclick="switchView('learn')" class="w-64 py-4 bg-white rounded-2xl shadow-lg hover:shadow-xl hover:bg-blue-100 transition-all border-2 border-blue-200 text-xl font-bold text-blue-700 flex flex-col items-center gap-2">
                    <span class="text-3xl">📖</span> 認字 (Learn)
                </button>
                <button onclick="startTest()" class="w-64 py-4 bg-white rounded-2xl shadow-lg hover:shadow-xl hover:bg-green-100 transition-all border-2 border-green-200 text-xl font-bold text-green-700 flex flex-col items-center gap-2">
                    <span class="text-3xl">🧠</span> 自我測驗 (Quiz)
                </button>
                <button onclick="startGame()" class="w-64 py-4 bg-white rounded-2xl shadow-lg hover:shadow-xl hover:bg-purple-100 transition-all border-2 border-purple-200 text-xl font-bold text-purple-700 flex flex-col items-center gap-2">
                    <span class="text-3xl">🎮</span> 小游戲 (Game)
                </button>
            </div>

            <!-- View 2: Learn (Flashcards) -->
            <div id="view-learn" class="view-section hidden flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="switchView('home')" class="px-4 py-2 bg-gray-200 rounded-lg shadow font-semibold hover:bg-gray-300">⬅️ 返回主頁</button>
                    <span class="text-gray-500 text-sm">點擊卡片翻轉並發音</span>
                </div>
                <div id="learn-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4 pb-10 overflow-y-auto">
                    <!-- Cards will be generated here by JS -->
                </div>
            </div>

            <!-- View 3: Self Test (Swipe Cards) -->
            <div id="view-test" class="view-section hidden flex-col h-full items-center">
                <div class="w-full flex justify-between items-center mb-4">
                    <button onclick="switchView('home')" class="px-4 py-2 bg-gray-200 rounded-lg shadow font-semibold hover:bg-gray-300">⬅️ 返回主頁</button>
                    <span id="test-progress" class="font-bold text-blue-600">剩餘: 0</span>
                </div>

                <!-- Card Area -->
                <div class="flex-1 flex w-full items-center justify-center relative overflow-hidden mt-4 mb-8">
                    
                    <!-- Swipe Card Container -->
                    <div id="test-card" class="absolute w-full max-w-sm h-80 perspective no-select z-10 cursor-pointer swipe-card">
                        <div id="test-card-inner" class="relative w-full h-full text-center transform-style-3d card-inner shadow-xl rounded-3xl border-2 border-gray-100 bg-white">
                            
                            <!-- Front (English) -->
                            <div class="absolute w-full h-full backface-hidden flex flex-col items-center justify-center bg-white rounded-3xl p-6">
                                <h2 id="test-word-en" class="text-4xl font-bold text-blue-800 mb-6 text-wrap break-words">Word</h2>
                                <p class="text-gray-500 mb-4">你知道讀音和意思嗎？</p>
                                <button id="btn-show-answer" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold shadow-md hover:bg-blue-600 active:scale-95 transition-transform" onclick="flipTestCard()">看答案 👁️</button>
                            </div>

                            <!-- Back (Chinese & Audio) -->
                            <div class="absolute w-full h-full backface-hidden rotate-y-180 flex flex-col items-center justify-center bg-yellow-50 rounded-3xl p-6 border-4 border-yellow-200">
                                <h2 id="test-word-en-back" class="text-3xl font-bold text-gray-800 mb-2 text-wrap break-words">Word</h2>
                                <h3 id="test-word-zh" class="text-2xl font-bold text-red-600 mb-6">意思</h3>
                                <button onclick="playCurrentTestAudio(event)" class="w-16 h-16 bg-blue-100 rounded-full flex justify-center items-center text-3xl shadow hover:bg-blue-200 mb-6 active:scale-95 transition-transform">
                                    🔊
                                </button>
                                <div class="text-sm text-gray-500 flex justify-between w-full px-4">
                                    <span>👈 左滑: 學識</span>
                                    <span>右滑: 重溫 👉</span>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Action Buttons (Visible only when answer is shown) -->
                <div id="test-actions" class="w-full max-w-sm flex justify-between gap-4 mb-10 opacity-0 pointer-events-none transition-opacity duration-300">
                    <button onclick="handleSwipe('left')" class="flex-1 py-4 bg-green-500 text-white rounded-xl shadow-lg font-bold text-lg active:scale-95 transition-transform">
                        ⬅️ 已經學識
                    </button>
                    <button onclick="handleSwipe('right')" class="flex-1 py-4 bg-orange-500 text-white rounded-xl shadow-lg font-bold text-lg active:scale-95 transition-transform">
                        需要重溫 ➡️
                    </button>
                </div>
            </div>

            <!-- View 3.5: Test Completion -->
            <div id="view-test-complete" class="view-section hidden flex-col items-center justify-center h-full">
                <div class="text-6xl mb-4">🎉</div>
                <h2 class="text-3xl font-bold text-green-600 mb-4">恭喜！</h2>
                <p class="text-xl text-gray-700 mb-8 text-center">你已經成功掌握了所有詞彙！</p>
                <div class="flex flex-col gap-4 w-64">
                    <button onclick="switchView('home')" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-gray-800 hover:bg-gray-300 shadow">返回主畫面</button>
                    <button onclick="startGame()" class="w-full py-3 bg-purple-500 rounded-xl font-bold text-white hover:bg-purple-600 shadow">進入小游戲 🎮</button>
                </div>
            </div>

            <!-- View 4: Mini Game (RPG Battle) -->
            <div id="view-game" class="view-section hidden flex-col h-full items-center bg-gray-900 rounded-3xl overflow-hidden relative shadow-2xl m-2 border-4 border-gray-700">
                
                <!-- Top Bar -->
                <div class="w-full flex justify-between items-center p-4 bg-gray-800 text-white z-10 border-b border-gray-700">
                    <button onclick="switchView('home')" class="px-3 py-2 bg-gray-700 rounded-lg shadow font-semibold hover:bg-gray-600 text-sm flex items-center gap-1">⬅️ 逃跑</button>
                    <div class="text-center">
                        <div class="text-xs text-gray-400">前進 8 步擊敗怪物</div>
                        <div id="game-progress" class="font-bold text-yellow-400 text-lg tracking-wider">步數: 0 / 8</div>
                    </div>
                </div>
                
                <!-- Battle Arena -->
                <div class="flex-1 w-full flex flex-col justify-end relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-gray-700 overflow-hidden">
                    <!-- Ground line -->
                    <div class="absolute bottom-6 w-full border-b-4 border-green-800 opacity-50"></div>
                    
                    <!-- Characters Area -->
                    <div class="w-full flex justify-between items-end px-6 sm:px-12 pb-6 relative z-10">
                        
                        <!-- Warrior (Player) -->
                        <div class="flex flex-col items-center z-20">
                            <!-- Hearts -->
                            <div id="warrior-hearts" class="flex gap-1 mb-2 text-lg sm:text-xl drop-shadow-md bg-black bg-opacity-30 px-2 py-1 rounded-full">
                                <!-- ❤️❤️❤️❤️❤️ -->
                            </div>
                            <!-- Sprite -->
                            <div id="warrior-sprite" class="text-6xl sm:text-7xl drop-shadow-2xl transition-transform duration-200 transform origin-bottom" style="--start-x: 0px;">
                                🦸‍♂️
                            </div>
                            <div id="warrior-shadow" class="w-16 h-3 bg-black bg-opacity-40 rounded-full mt-1 blur-[2px] transition-transform duration-200"></div>
                        </div>

                        <!-- Monster -->
                        <div class="flex flex-col items-center z-10">
                            <!-- Monster Speech Bubble -->
                            <div id="monster-speech" class="bg-white px-3 py-2 rounded-2xl rounded-br-none font-bold text-lg text-purple-900 shadow-lg mb-2 relative animate-bounce border-2 border-purple-400 max-w-[150px] text-center break-words">
                                Word
                            </div>
                            <!-- Sprite -->
                            <div id="monster-sprite" class="text-7xl sm:text-8xl drop-shadow-2xl transform origin-bottom">
                                🐉
                            </div>
                            <div class="w-20 h-4 bg-black bg-opacity-40 rounded-full mt-1 blur-[2px]"></div>
                        </div>

                    </div>
                </div>

                <!-- Shield Options Area -->
                <div class="w-full p-4 bg-gray-800 rounded-t-3xl z-20 pb-6 border-t-4 border-gray-600">
                    <p class="text-center text-gray-300 mb-3 text-sm tracking-wide">選擇正確的盾牌抵擋怪物的攻擊！</p>
                    <div id="game-shields" class="flex flex-col sm:flex-row justify-center gap-3">
                        <!-- Shields generated by JS -->
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 text-center shadow-2xl transform scale-95 transition-transform" id="modal-content">
            <h3 id="modal-title" class="text-xl font-bold mb-2"></h3>
            <p id="modal-desc" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="px-6 py-2 bg-blue-500 text-white rounded-lg font-bold shadow hover:bg-blue-600">確定</button>
        </div>
    </div>

    <script>
        // Vocabulary Data (16 words provided in prompt)
        const vocabList = [
            { en: 'add', zh: '加入 / 增加' },
            { en: 'Chinese New Year', zh: '農曆新年' },
            { en: 'chop', zh: '切碎 / 砍' },
            { en: 'confused', zh: '感到困惑的' },
            { en: 'exams', zh: '考試' },
            { en: 'exchange gifts', zh: '交換禮物' },
            { en: 'friends', zh: '朋友' },
            { en: 'heavy', zh: '重的' },
            { en: 'mix', zh: '混合' },
            { en: 'parents', zh: '父母' },
            { en: 'peel', zh: '剝皮' },
            { en: 'pet adoption event', zh: '寵物領養活動' },
            { en: 'remove', zh: '移除 / 拿走' },
            { en: 'sour', zh: '酸的' },
            { en: 'sweets', zh: '糖果 / 甜食' },
            { en: 'worried', zh: '擔心的' }
        ];

        // --- Core Functions ---
        
        // iOS Audio Unlocker (解決 Safari 語音無法自動播放的問題)
        let isAudioUnlocked = false;
        function unlockAudioForIOS() {
            if (isAudioUnlocked) return;
            
            // 1. Prime Web Audio API (音效)
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // 2. Prime Speech Synthesis (語音)
            if ('speechSynthesis' in window) {
                const primeUtterance = new SpeechSynthesisUtterance('');
                primeUtterance.volume = 0; // 靜音播放一次以解鎖引擎
                window.speechSynthesis.speak(primeUtterance);
            }
            
            isAudioUnlocked = true;
            document.removeEventListener('touchstart', unlockAudioForIOS);
            document.removeEventListener('click', unlockAudioForIOS);
        }
        
        // 監聽玩家在網頁的第一次互動
        document.addEventListener('touchstart', unlockAudioForIOS, { once: true });
        document.addEventListener('click', unlockAudioForIOS, { once: true });

        // Speech Synthesis
        function speak(text) {
            if ('speechSynthesis' in window) {
                // Cancel current speech if any
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.9; // Slightly slower for clearer listening
                window.speechSynthesis.speak(utterance);
            }
        }

        // View Navigation
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('flex');
                el.classList.add('hidden');
            });
            const activeView = document.getElementById(`view-${viewId}`);
            activeView.classList.remove('hidden');
            activeView.classList.add('flex');

            if (viewId === 'learn') {
                renderLearnGrid();
            }
        }

        // Custom Modal
        function showModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const modal = document.getElementById('message-modal');
            modal.classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-content').classList.remove('scale-95'), 10);
        }

        function closeModal() {
            document.getElementById('modal-content').classList.add('scale-95');
            setTimeout(() => document.getElementById('message-modal').classList.add('hidden'), 200);
        }

        // Array Shuffle utility
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- 1. 認字 (Learn) Module ---
        function renderLearnGrid() {
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = ''; // clear existing
            
            vocabList.forEach((vocab, index) => {
                const card = document.createElement('div');
                card.className = 'perspective h-40 cursor-pointer no-select';
                card.innerHTML = `
                    <div class="relative w-full h-full card-inner transform-style-3d shadow-md rounded-xl border border-gray-200" id="learn-card-${index}">
                        <!-- Front -->
                        <div class="absolute w-full h-full backface-hidden flex items-center justify-center bg-white rounded-xl p-2">
                            <h3 class="text-lg font-bold text-blue-900 text-center text-wrap break-words leading-tight">${vocab.en}</h3>
                        </div>
                        <!-- Back -->
                        <div class="absolute w-full h-full backface-hidden rotate-y-180 flex flex-col items-center justify-center bg-blue-50 rounded-xl p-2 border-2 border-blue-200">
                            <h3 class="text-md font-bold text-red-600 text-center mb-2 leading-tight">${vocab.zh}</h3>
                            <button onclick="playLearnAudio(event, '${vocab.en}')" class="w-10 h-10 bg-blue-200 rounded-full flex justify-center items-center text-xl shadow-sm hover:bg-blue-300">
                                🔊
                            </button>
                        </div>
                    </div>
                `;
                
                // Click to flip
                card.onclick = () => {
                    const inner = document.getElementById(`learn-card-${index}`);
                    const isFlipped = card.classList.contains('flipped');
                    if (!isFlipped) {
                        card.classList.add('flipped');
                        speak(vocab.en);
                    } else {
                        card.classList.remove('flipped');
                    }
                };
                
                grid.appendChild(card);
            });
        }

        function playLearnAudio(event, word) {
            event.stopPropagation(); // Prevent card from flipping back
            speak(word);
        }

        // --- 2. 自我測驗 (Quiz / Test) Module ---
        let testQueue = [];
        let currentTestItem = null;
        let isCardFlipped = false;

        // Touch handling variables
        let startX = 0;
        let currentX = 0;
        let isDragging = false;
        const testCardEl = document.getElementById('test-card');

        function startTest() {
            // Create a queue of indices
            testQueue = vocabList.map((_, index) => index);
            shuffleArray(testQueue);
            switchView('test');
            loadNextTestCard();
        }

        function loadNextTestCard() {
            if (testQueue.length === 0) {
                switchView('test-complete');
                return;
            }

            document.getElementById('test-progress').innerText = `剩餘: ${testQueue.length}`;
            const index = testQueue[0];
            currentTestItem = vocabList[index];
            isCardFlipped = false;

            // Reset UI instantly without animation
            testCardEl.style.transition = 'none';
            const innerCard = document.getElementById('test-card-inner');
            innerCard.style.transition = 'none';

            testCardEl.classList.remove('flipped', 'swipe-left-anim', 'swipe-right-anim');
            testCardEl.style.transform = '';
            innerCard.classList.remove('rotate-y-180');
            
            // Force reflow to snap instantly
            void testCardEl.offsetWidth;
            
            testCardEl.style.transition = '';
            innerCard.style.transition = '';

            document.getElementById('test-actions').classList.remove('opacity-100', 'pointer-events-auto');
            document.getElementById('test-actions').classList.add('opacity-0', 'pointer-events-none');
            
            // Populate content
            document.getElementById('test-word-en').innerText = currentTestItem.en;
            document.getElementById('test-word-en-back').innerText = currentTestItem.en;
            document.getElementById('test-word-zh').innerText = currentTestItem.zh;
        }

        function flipTestCard() {
            if (isCardFlipped) return;
            isCardFlipped = true;
            testCardEl.classList.add('flipped');
            speak(currentTestItem.en);
            
            // Show action buttons
            document.getElementById('test-actions').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('test-actions').classList.add('opacity-100', 'pointer-events-auto');
        }

        function playCurrentTestAudio(event) {
            event.stopPropagation();
            if (currentTestItem) {
                speak(currentTestItem.en);
            }
        }

        // Button action for Swipe
        function handleSwipe(direction) {
            if (!isCardFlipped) return;

            if (direction === 'left') {
                // Learned
                testCardEl.classList.add('swipe-left-anim');
                testQueue.shift(); // Remove from queue
            } else {
                // Need review
                testCardEl.classList.add('swipe-right-anim');
                const item = testQueue.shift();
                testQueue.push(item); // Add to end of queue
            }

            // Wait for animation, then load next
            setTimeout(() => {
                loadNextTestCard();
            }, 300);
        }

        // Touch Events for physical swiping
        testCardEl.addEventListener('touchstart', (e) => {
            if (!isCardFlipped) return;
            startX = e.touches[0].clientX;
            isDragging = true;
            testCardEl.style.transition = 'none'; // remove transition for smooth drag
        });

        testCardEl.addEventListener('touchmove', (e) => {
            if (!isDragging || !isCardFlipped) return;
            currentX = e.touches[0].clientX;
            const diffX = currentX - startX;
            const rotate = diffX * 0.05;
            testCardEl.style.transform = `translateX(${diffX}px) rotate(${rotate}deg)`;
        });

        testCardEl.addEventListener('touchend', (e) => {
            if (!isDragging || !isCardFlipped) return;
            isDragging = false;
            testCardEl.style.transition = '';
            
            const diffX = currentX - startX;
            const threshold = 80;

            if (diffX < -threshold) {
                // Swiped Left (Learned)
                handleSwipe('left');
            } else if (diffX > threshold) {
                // Swiped Right (Review)
                handleSwipe('right');
            } else {
                // Snap back
                testCardEl.style.transform = '';
            }
        });

        // Mouse events for desktop swiping support (Optional but good for testing)
        testCardEl.addEventListener('mousedown', (e) => {
            if (!isCardFlipped) return;
            startX = e.clientX;
            isDragging = true;
            testCardEl.style.transition = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || !isCardFlipped) return;
            currentX = e.clientX;
            const diffX = currentX - startX;
            const rotate = diffX * 0.05;
            testCardEl.style.transform = `translateX(${diffX}px) rotate(${rotate}deg)`;
        });

        window.addEventListener('mouseup', (e) => {
             if (!isDragging || !isCardFlipped) return;
            isDragging = false;
            testCardEl.style.transition = '';
            
            const diffX = currentX - startX;
            const threshold = 80;

            if (diffX < -threshold) {
                handleSwipe('left');
            } else if (diffX > threshold) {
                handleSwipe('right');
            } else {
                testCardEl.style.transform = '';
            }
        });


        // --- Audio Effects Setup (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            unlockAudioForIOS(); // 確保進入遊戲時觸發解鎖
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function sfxCorrect() {
            playTone(600, 'sine', 0.1, 0.1);
            setTimeout(() => playTone(800, 'sine', 0.15, 0.1), 100);
        }

        function sfxWrong() {
            playTone(200, 'sawtooth', 0.3, 0.15);
            setTimeout(() => playTone(150, 'sawtooth', 0.4, 0.15), 150);
        }

        function sfxWin() {
            [400, 500, 600, 800].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'square', 0.2, 0.1), i * 150);
            });
        }

        function sfxLose() {
            [300, 250, 200, 150].forEach((freq, i) => {
                setTimeout(() => playTone(freq, 'sawtooth', 0.3, 0.15), i * 200);
            });
        }


        // --- 3. 小游戲 (RPG Mini Game) Module ---
        let gameQuestions = [];
        let currentGameIndex = 0;
        
        let warriorHealth = 5;
        let warriorSteps = 0;
        const maxHealth = 5;
        const requiredSteps = 8;
        
        let currentWarriorPos = 0; 
        const stepDistance = 25; // pixels to move per step

        function startGame() {
            initAudio(); // Initialize audio context on user click
            warriorHealth = maxHealth;
            warriorSteps = 0;
            currentGameIndex = 0;
            currentWarriorPos = 0;
            
            // Prepare questions (select 8 words randomly)
            let pool = [...vocabList];
            shuffleArray(pool);
            gameQuestions = pool.slice(0, requiredSteps); 
            
            // Reset character positions
            const warrior = document.getElementById('warrior-sprite');
            const shadow = document.getElementById('warrior-shadow');
            warrior.style.setProperty('--start-x', '0px');
            warrior.style.transform = `translateX(0px)`;
            shadow.style.transform = `translateX(0px)`;
            warrior.className = 'text-6xl sm:text-7xl drop-shadow-2xl transition-transform duration-200 transform origin-bottom'; // Reset animations
            
            updateHearts();
            switchView('game');
            loadGameQuestion();
        }

        function updateHearts() {
            const heartsContainer = document.getElementById('warrior-hearts');
            let heartsHtml = '';
            for(let i=0; i<maxHealth; i++) {
                if (i < warriorHealth) heartsHtml += '❤️';
                else heartsHtml += '<span class="opacity-30 grayscale">❤️</span>';
            }
            heartsContainer.innerHTML = heartsHtml;
        }

        function loadGameQuestion() {
            if (warriorSteps >= requiredSteps) {
                setTimeout(gameWin, 500);
                return;
            }
            if (warriorHealth <= 0) {
                setTimeout(gameOver, 500);
                return;
            }

            document.getElementById('game-progress').innerText = `步數: ${warriorSteps} / ${requiredSteps}`;
            
            const currentQ = gameQuestions[currentGameIndex];
            
            // Generate 3 options (1 correct, 2 wrong)
            let options = [{ text: currentQ.zh, correct: true }];
            let fakePool = [...vocabList].filter(v => v.zh !== currentQ.zh);
            shuffleArray(fakePool);
            
            options.push({ text: fakePool[0].zh, correct: false });
            options.push({ text: fakePool[1].zh, correct: false });
            shuffleArray(options);

            // Update UI
            const monsterSpeech = document.getElementById('monster-speech');
            monsterSpeech.innerText = currentQ.en;
            
            const shieldsContainer = document.getElementById('game-shields');
            shieldsContainer.innerHTML = options.map((opt, idx) => `
                <button onclick="checkGameAnswer(${opt.correct}, this)" class="shield-btn flex-1 py-3 px-2 bg-gradient-to-b from-yellow-100 to-yellow-300 hover:from-yellow-200 hover:to-yellow-400 border-b-4 border-yellow-600 rounded-xl text-lg font-bold text-gray-800 shadow-md flex items-center justify-center gap-2">
                    🛡️ <span class="break-words text-sm sm:text-base">${opt.text}</span>
                </button>
            `).join('');
            
            // Monster attack animation
            const monster = document.getElementById('monster-sprite');
            monster.classList.remove('anim-attack');
            void monster.offsetWidth; // trigger reflow
            monster.classList.add('anim-attack');
            
            speak(currentQ.en); // Auto speak when question appears
        }

        function checkGameAnswer(isCorrect, btnElement) {
            // Disable all buttons to prevent spam clicking
            const buttons = document.querySelectorAll('.shield-btn');
            buttons.forEach(btn => btn.style.pointerEvents = 'none');

            const warrior = document.getElementById('warrior-sprite');
            const shadow = document.getElementById('warrior-shadow');

            if (isCorrect) {
                // Correct logic
                sfxCorrect();
                btnElement.classList.replace('from-yellow-100', 'from-green-300');
                btnElement.classList.replace('to-yellow-300', 'to-green-500');
                btnElement.classList.replace('border-yellow-600', 'border-green-700');
                
                warriorSteps++;
                
                // Set start position for animation and animate
                warrior.style.setProperty('--start-x', `${currentWarriorPos}px`);
                warrior.classList.add('anim-step');
                
                currentWarriorPos += stepDistance; // move physical position right
                
                setTimeout(() => {
                    warrior.classList.remove('anim-step');
                    warrior.style.transform = `translateX(${currentWarriorPos}px)`;
                    shadow.style.transform = `translateX(${currentWarriorPos}px)`;
                }, 400);

            } else {
                // Incorrect logic
                sfxWrong();
                btnElement.classList.replace('from-yellow-100', 'from-red-300');
                btnElement.classList.replace('to-yellow-300', 'to-red-500');
                btnElement.classList.replace('border-yellow-600', 'border-red-700');
                
                warriorHealth--;
                updateHearts();
                
                // Shake / Hurt animation
                warrior.style.setProperty('--start-x', `${currentWarriorPos}px`);
                warrior.classList.add('anim-hurt');
                setTimeout(() => warrior.classList.remove('anim-hurt'), 300);
            }
            
            currentGameIndex++;
            
            // Proceed to next question after delay
            setTimeout(() => {
                loadGameQuestion();
            }, 1000);
        }
        
        function gameWin() {
            sfxWin();
            showModal("✨ 戰鬥勝利！ ✨", "太棒了！小戰士成功擊敗了怪物，你掌握了所有單字！");
            // Override default close modal action to return to home screen
            const btn = document.getElementById('modal-content').querySelector('button');
            const originalOnClick = btn.onclick;
            btn.onclick = () => {
                closeModal();
                switchView('home');
                btn.onclick = originalOnClick; // restore
            };
        }
        
        function gameOver() {
            sfxLose();
            showModal("💔 戰鬥失敗", "小戰士的愛心耗盡了... 休息一下再來挑戰吧！");
            const btn = document.getElementById('modal-content').querySelector('button');
            const originalOnClick = btn.onclick;
            btn.onclick = () => {
                closeModal();
                switchView('home');
                btn.onclick = originalOnClick; // restore
            };
        }

    </script>
